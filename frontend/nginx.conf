server {
  listen 80;
  server_name demo.treedlink.com;
  return 301 https://$server_name$request_uri;
}

server {
  listen 443 ssl;
  server_name demo.treedlink.com;
  
  ssl_certificate /etc/letsencrypt/live/demo.treedlink.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/demo.treedlink.com/privkey.pem;
  
  location / {
    root /usr/share/nginx/html;
    try_files $uri /index.html;
  }
  
  location /yourtree/api/ {
    proxy_pass http://backend:3000;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  }
}
